<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar Coin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:18px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:20px;
}

.balance{
font-size:42px;
text-align:center;
font-weight:bold;
margin-top:10px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-top:5px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#22c55e;
color:#fff;
font-size:18px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

.timer{
font-size:26px;
text-align:center;
margin-top:10px;
font-weight:bold;
color:#ffd54f;
}

.withdraw{
background:#f59e0b;
}

.small{
font-size:14px;
opacity:.8;
text-align:center;
margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>🪙 Calendar Coin</h1>

<div class="card">
<h2>Balance</h2>
<div class="balance" id="balance">0 Coin</div>
</div>

<div class="card">
<h2>⛏ Mining</h2>
<div class="subtitle">100 Coin / 24 Jam</div>

<div class="timer" id="timer">
Ready
</div>

<button id="mineBtn">
Claim
</button>
</div>

<div class="card">
<h2>📺 Watch Ads</h2>
<div class="subtitle">
Reward +5 Coin
</div>

<button id="adsBtn">
Watch Ads
</button>
</div>

<div class="card">
<h2>📅 Daily Login</h2>

<div class="subtitle">
Reward +5 Coin
</div>

<button id="dailyBtn">
Claim Daily
</button>
</div>

<div class="card">
<h2>💸 Withdraw</h2>

<div class="subtitle">
Minimum 10,000 Coin
</div>

<button class="withdraw">
Withdraw
</button>

<div class="small">
Withdraw akan aktif jika saldo mencapai 10.000 Coin
</div>

</div>

</div>

<script>
  let balance = Number(localStorage.getItem("balance")) || 0;
let mineTime = Number(localStorage.getItem("mineTime")) || 0;
let dailyDate = localStorage.getItem("dailyDate") || "";

const balanceEl = document.getElementById("balance");
const timerEl = document.getElementById("timer");
const mineBtn = document.getElementById("mineBtn");
const adsBtn = document.getElementById("adsBtn");
const dailyBtn = document.getElementById("dailyBtn");

function save(){
localStorage.setItem("balance", balance);
localStorage.setItem("mineTime", mineTime);
}

function updateBalance(){
balanceEl.innerHTML = balance + " Coin";
}

updateBalance();

mineBtn.onclick=function(){

if(Date.now()<mineTime)return;

balance+=100;

mineTime=Date.now()+24*60*60*1000;

save();

updateBalance();

updateTimer();

};

adsBtn.onclick=function(){

balance+=5;

save();

updateBalance();

alert("Reward +5 Coin");

};

dailyBtn.onclick=function(){

let today=new Date().toDateString();

if(today==dailyDate){

alert("Daily sudah diambil hari ini");

return;

}

dailyDate=today;

localStorage.setItem("dailyDate",today);

balance+=5;

save();

updateBalance();

alert("Daily berhasil di-claim");

};

function updateTimer(){

let now=Date.now();

if(now>=mineTime){

timerEl.innerHTML="Ready";

mineBtn.disabled=false;

return;

}

mineBtn.disabled=true;

let diff=mineTime-now;

let h=Math.floor(diff/3600000);

let m=Math.floor((diff%3600000)/60000);

let s=Math.floor((diff%60000)/1000);

timerEl.innerHTML=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

setInterval(updateTimer,1000);

updateTimer();
