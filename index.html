<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Coin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0D1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #161B22;
            border-radius: 28px;
            padding: 24px 20px 28px;
            border: 1px solid #30363D;
            text-align: center;
        }
        h1 { color: #F0F6FC; font-size: 24px; margin-bottom: 4px; }
        .date { color: #8B949E; font-size: 14px; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: #0D1117;
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .grid .n { color: #8B949E; font-size: 12px; font-weight: bold; padding: 4px; }
        .grid .d { padding: 8px; border-radius: 50%; font-size: 14px; color: #C9D1D9; }
        .grid .d.today { background: #238636; color: #fff; font-weight: bold; }
        .grid .d.empty { visibility: hidden; }
        .status { color: #F0883E; font-size: 14px; margin-bottom: 14px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-claim { background: #238636; color: #fff; }
        .btn-claim:disabled { background: #21262D; color: #484F58; cursor: not-allowed; }
        .btn-withdraw { background: #1F6FEB; color: #fff; }
        .btn-withdraw:disabled { background: #21262D; color: #484F58; cursor: not-allowed; }
        .balance {
            background: #0D1117;
            border-radius: 16px;
            padding: 16px;
            margin: 14px 0 12px;
            border: 1px solid #21262D;
        }
        .balance .label { color: #8B949E; font-size: 12px; text-transform: uppercase; }
        .balance .amount { font-size: 32px; font-weight: bold; color: #F0F6FC; }
        .balance .amount .ton { font-size: 16px; color: #8B949E; }
        .balance .usd { color: #8B949E; font-size: 14px; }
        .footer { color: #484F58; font-size: 11px; margin-top: 14px; }
    </style>
</head>
<body>

<div class="card">

    <h1>📅 Calendar</h1>
    <div class="date" id="tgl">Loading...</div>

    <div class="grid" id="kalender"></div>

    <div class="status" id="status">✨ Not claimed today</div>

    <button class="btn btn-claim" id="btnClaim">🪙 Claim Daily Coin</button>

    <div class="balance">
        <div class="label">Balance</div>
        <div class="amount">
            <span id="saldoTon">0.000</span> <span class="ton">TON</span>
        </div>
        <div class="usd">$<span id="saldoUsd">0.000</span></div>
    </div>

    <button class="btn btn-withdraw" id="btnWithdraw">💳 Withdraw (1 TON min)</button>

    <div class="footer">Min. 1 TON · Secure · Fast</div>

</div>

<script>
    // ===== DATA =====
    var today = new Date();
    var tgl = today.getDate();
    var bulan = today.getMonth();
    var tahun = today.getFullYear();
    var todayStr = today.toISOString().split('T')[0];

    var saldo = parseFloat(localStorage.getItem('saldo')) || 0;
    var lastClaim = localStorage.getItem('lastClaim') || '';
    var alreadyClaimed = (lastClaim === todayStr);

    // ===== KALENDER =====
    function renderCalendar() {
        var days = ['S','M','T','W','T','F','S'];
        var firstDay = new Date(tahun, bulan, 1).getDay();
        var totalDays = new Date(tahun, bulan+1, 0).getDate();
        var html = '';
        for (var i = 0; i < 7; i++) html += '<div class="n">'+days[i]+'</div>';
        for (var i = 0; i < firstDay; i++) html += '<div class="d empty"></div>';
        for (var d = 1; d <= totalDays; d++) {
            var cls = 'd';
            if (d === tgl) cls += ' today';
            html += '<div class="'+cls+'">'+d+'</div>';
        }
        document.getElementById('kalender').innerHTML = html;
        var opt = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
        document.getElementById('tgl').textContent = today.toLocaleDateString('en-US', opt);
    }

    // ===== UPDATE UI =====
    function updateUI() {
        document.getElementById('saldoTon').textContent = saldo.toFixed(3);
        document.getElementById('saldoUsd').textContent = (saldo * 1.65).toFixed(3);

        var status = document.getElementById('status');
        var btn = document.getElementById('btnClaim');
        if (alreadyClaimed) {
            status.textContent = '✅ Claimed today';
            btn.disabled = true;
            btn.textContent = '✅ Claimed';
        } else {
            status.textContent = '✨ Not claimed today';
            btn.disabled = false;
            btn.textContent = '🪙 Claim Daily Coin';
        }

        var wd = document.getElementById('btnWithdraw');
        if (saldo >= 1) {
            wd.disabled = false;
            wd.textContent = '💳 Withdraw Now';
        } else {
            wd.disabled = true;
            wd.textContent = '💳 Withdraw (1 TON min)';
        }
    }

    // ===== SAVE =====
    function saveData() {
        localStorage.setItem('saldo', saldo);
        localStorage.setItem('lastClaim', lastClaim);
    }

    // ===== CLAIM =====
    function doClaim() {
        if (alreadyClaimed) {
            alert('✅ Already claimed today! Come back tomorrow.');
            return;
        }
        saldo += 0.0005;
        lastClaim = todayStr;
        alreadyClaimed = true;
        saveData();
        updateUI();
        alert('🎉 +0.0005 TON');
    }

    // ===== WITHDRAW =====
    function doWithdraw() {
        if (saldo < 1) {
            alert('⚠️ Minimum 1 TON required');
            return;
        }
        alert('💳 Withdraw to wallet...');
    }

    // ===== EVENTS =====
    document.getElementById('btnClaim').onclick = doClaim;
    document.getElementById('btnWithdraw').onclick = doWithdraw;

    // ===== START =====
    renderCalendar();
    updateUI();
    console.log('✅ Calendar Coin ready!');
</script>

</body>
</html>
