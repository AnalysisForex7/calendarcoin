
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Coin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0D1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #161B22;
            border-radius: 28px;
            padding: 24px 20px 28px;
            border: 1px solid #30363D;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; font-weight: 600; color: #F0F6FC; letter-spacing: -0.3px; }
        .header .badge { background: #238636; color: #fff; font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .date { font-size: 14px; color: #8B949E; margin-bottom: 18px; font-weight: 400; }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #0D1117;
            padding: 8px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .calendar .day-name { font-size: 11px; font-weight: 600; color: #8B949E; text-align: center; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.3px; }
        .calendar .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: #C9D1D9;
            border-radius: 50%;
            transition: 0.15s;
        }
        .calendar .day.today { background: #238636; color: #fff; font-weight: 600; box-shadow: 0 0 0 2px #238636; }
        .calendar .day.done { color: #8B949E; opacity: 0.4; }
        .calendar .day.empty { visibility: hidden; }
        .status { font-size: 14px; color: #F0883E; text-align: center; margin-bottom: 14px; font-weight: 450; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-claim { background: #238636; color: #fff; }
        .btn-claim:hover { background: #2EA043; }
        .btn-claim:disabled { background: #21262D; color: #484F58; cursor: not-allowed; }
        .btn-withdraw { background: #1F6FEB; color: #fff; }
        .btn-withdraw:hover { background: #388BFD; }
        .btn-withdraw:disabled { background: #21262D; color: #484F58; cursor: not-allowed; }
        .balance {
            background: #0D1117;
            border-radius: 16px;
            padding: 16px;
            margin: 14px 0 12px;
            border: 1px solid #21262D;
        }
        .balance .label { font-size: 12px; color: #8B949E; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .balance .amount { font-size: 32px; font-weight: 700; color: #F0F6FC; margin-top: 2px; }
        .balance .amount .ton { font-size: 16px; font-weight: 500; color: #8B949E; }
        .balance .usd { font-size: 14px; color: #8B949E; margin-top: 2px; }
        .footer { font-size: 11px; color: #484F58; text-align: center; margin-top: 14px; }
        .referral-box {
            background: #0D1117;
            border-radius: 16px;
            padding: 14px;
            margin: 14px 0 12px;
            border: 1px solid #21262D;
        }
        .referral-box .label { font-size: 12px; color: #8B949E; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .referral-box .count { font-size: 24px; font-weight: 700; color: #F0F6FC; }
        .referral-box .link { font-size: 11px; color: #58A6FF; word-break: break-all; margin: 6px 0; background: #161B22; padding: 6px 10px; border-radius: 8px; }
        .referral-box .status-text { font-size: 11px; color: #8B949E; margin-top: 4px; }
        .btn-referral { background: #1F6FEB; color: #fff; font-size: 14px; padding: 12px; }
        .btn-referral:hover { background: #388BFD; }
    </style>
</head>
<body>

<div class="card">

    <div class="header">
        <h1>📅 Calendar</h1>
        <span class="badge">TON</span>
    </div>

    <div class="date" id="tgl">Loading...</div>

    <div class="calendar" id="kalender"></div>

    <div class="status" id="status">✨ Not claimed today</div>

    <button class="btn btn-claim" id="btnClaim">🪙 Claim Daily Coin</button>

    <div class="balance">
        <div class="label">Balance</div>
        <div class="amount">
            <span id="saldoTon">0.000</span> <span class="ton">TON</span>
        </div>
        <div class="usd">$<span id="saldoUsd">0.000</span></div>
    </div>

    <button class="btn btn-withdraw" id="btnWithdraw">💳 Withdraw</button>

    <!-- REFERRAL -->
    <div class="referral-box">
        <div class="label">👥 Referrals</div>
        <div class="count" id="referralCount">0</div>
        <div class="status-text" id="referralStatus">⏳ Need 3 daily claims & username</div>
        <div class="link" id="referralLink">Loading...</div>
        <button class="btn btn-referral" id="btnReferral">📤 Share Link</button>
    </div>

    <div class="footer">Min. 1 TON · Secure · Fast</div>

</div>

<script>
    // ============================================================
    // 1. AMBIL DATA TELEGRAM
    // ============================================================
    var tg = window.Telegram?.WebApp || {};
    var user = tg.initDataUnsafe?.user || {};
    var userId = user.id || null;
    var username = user.username || null;
    var deviceId = '';

    // ============================================================
    // 2. DETEKSI PERANGKAT (Device Fingerprint)
    // ============================================================
    function getDeviceId() {
        var screen = screen.width + 'x' + screen.height;
        var userAgent = navigator.userAgent;
        var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var lang = navigator.language || 'en-US';
        var fingerprint = screen + '|' + userAgent + '|' + timezone + '|' + lang;
        return fingerprint;
    }

    deviceId = getDeviceId();

    // ============================================================
    // 3. DATA APLIKASI
    // ============================================================
    var today = new Date();
    var tgl = today.getDate();
    var bulan = today.getMonth();
    var tahun = today.getFullYear();
    var todayStr = today.toISOString().split('T')[0];

    // ============================================================
    // 4. LOCAL STORAGE
    // ============================================================
    var saldo = parseFloat(localStorage.getItem('saldo')) || 0;
    var lastClaim = localStorage.getItem('lastClaim') || '';
    var alreadyClaimed = (lastClaim === todayStr);

    // ============================================================
    // 5. REFERRAL SYSTEM (Dengan Validasi)
    // ============================================================
    // Format referralData:
    // {
    //   "referrerId": {
    //     "count": 0,         // total referral yang valid
    //     "list": {
    //       "userId": {
    //         "username": "joko",
    //         "deviceId": "xxx",
    //         "claimDays": 0,
    //         "firstClaim": "2026-07-08",
    //         "lastClaim": "2026-07-10",
    //         "isValid": false
    //       }
    //     }
    //   }
    // }

    var referralData = JSON.parse(localStorage.getItem('referralData')) || {};
    var userReferrals = referralData[userId] || { count: 0, list: {} };

    // ============================================================
    // 6. VALIDASI REFERRAL
    // ============================================================
    function isValidReferral(refUserId) {
        var refData = userReferrals.list[refUserId];
        if (!refData) return false;

        // Syarat 1: Harus punya username
        if (!refData.username) return false;

        // Syarat 2: Minimal claim 3 hari
        if (refData.claimDays < 3) return false;

        // Syarat 3: Device ID unik (gak boleh sama dengan referrer atau user lain)
        if (refData.deviceId === deviceId) return false;

        // Syarat 4: Sudah login minimal 3 hari berbeda
        var firstClaim = new Date(refData.firstClaim);
        var diffDays = Math.floor((today - firstClaim) / (1000 * 60 * 60 * 24));
        if (diffDays < 3) return false;

        return true;
    }

    // ============================================================
    // 7. HITUNG REFERRAL VALID
    // ============================================================
    function countValidReferrals() {
        var count = 0;
        for (var key in userReferrals.list) {
            if (isValidReferral(key)) {
                count++;
            }
        }
        userReferrals.count = count;
        referralData[userId] = userReferrals;
        localStorage.setItem('referralData', JSON.stringify(referralData));
        return count;
    }

    // ============================================================
    // 8. TAMBAH REFERRAL (dipanggil saat user daftar pake link)
    // ============================================================
    function addReferral(refUserId, refUsername, refDeviceId) {
        // Cek apakah referral sudah ada
        if (userReferrals.list[refUserId]) {
            return;
        }

        // Cek device ID (tuyul prevention)
        if (refDeviceId === deviceId) {
            console.warn('⚠️ Device ID sama dengan referrer!');
            return;
        }

        // Cek apakah device sudah dipakai user lain
        for (var key in userReferrals.list) {
            if (userReferrals.list[key].deviceId === refDeviceId) {
                console.warn('⚠️ Device ID sudah terdaftar!');
                return;
            }
        }

        // Tambah referral baru
        userReferrals.list[refUserId] = {
            username: refUsername,
            deviceId: refDeviceId,
            claimDays: 0,
            firstClaim: todayStr,
            lastClaim: '',
            isValid: false
        };

        referralData[userId] = userReferrals;
        localStorage.setItem('referralData', JSON.stringify(referralData));
    }

    // ============================================================
    // 9. UPDATE CLAIM REFERRAL (dipanggil setiap user claim)
    // ============================================================
    function updateReferralClaim(userId) {
        // Cari apakah user ini ada di list referral
        for (var refKey in referralData) {
            var refList = referralData[refKey].list;
            if (refList[userId]) {
                var refData = refList[userId];
                // Update claim days (cuma 1x per hari)
                if (refData.lastClaim !== todayStr) {
                    refData.claimDays = refData.claimDays + 1;
                    refData.lastClaim = todayStr;
                    refData.isValid = isValidReferral(userId);
                    // Kalau valid, tambah bonus ke referrer
                    if (refData.isValid) {
                        var referrerSaldo = parseFloat(localStorage.getItem('saldo')) || 0;
                        referrerSaldo += 0.0005; // bonus referral
                        localStorage.setItem('saldo', referrerSaldo);
                        console.log('🎉 Referral bonus untuk ' + refKey);
                    }
                    localStorage.setItem('referralData', JSON.stringify(referralData));
                }
                break;
            }
        }
    }

    // ============================================================
    // 10. FUNGSI LAIN
    // ============================================================
    function getReferralLink() {
        if (!userId) return 'https://t.me/CalendarCoinBot/rewards';
        return 'https://t.me/CalendarCoinBot/rewards?start=' + userId;
    }

    // ============================================================
    // 11. KALENDER
    // ============================================================
    function renderCalendar() {
        var days = ['S','M','T','W','T','F','S'];
        var firstDay = new Date(tahun, bulan, 1).getDay();
        var totalDays = new Date(tahun, bulan+1, 0).getDate();

        var html = '';
        for (var i = 0; i < 7; i++) {
            html += '<div class="day-name">'+days[i]+'</div>';
        }
        for (var i = 0; i < firstDay; i++) {
            html += '<div class="day empty"></div>';
        }
        for (var d = 1; d <= totalDays; d++) {
            var cls = 'day';
            if (d === tgl) cls += ' today';
            if (d < tgl) cls += ' done';
            html += '<div class="'+cls+'">'+d+'</div>';
        }
        document.getElementById('kalender').innerHTML = html;

        var opt = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
        document.getElementById('tgl').textContent = today.toLocaleDateString('en-US', opt);
    }

    // ============================================================
    // 12. UPDATE UI
    // ============================================================
    function updateUI() {
        // Balance
        document.getElementById('saldoTon').textContent = saldo.toFixed(3);
        document.getElementById('saldoUsd').textContent = (saldo * 1.65).toFixed(3);

        // Claim status
        var status = document.getElementById('status');
        var btn = document.getElementById('btnClaim');
        if (alreadyClaimed) {
            status.textContent = '✅ Claimed today';
            btn.disabled = true;
            btn.textContent = '✅ Claimed';
        } else {
            status.textContent = '✨ Not claimed today';
            btn.disabled = false;
            btn.textContent = '🪙 Claim Daily Coin';
        }

        // Withdraw
        var wd = document.getElementById('btnWithdraw');
        if (saldo >= 1) {
            wd.disabled = false;
            wd.textContent = '💳 Withdraw Now';
        } else {
            wd.disabled = true;
            wd.textContent = '💳 Withdraw (1 TON min)';
        }

        // Referral
        var validCount = countValidReferrals();
        document.getElementById('referralCount').textContent = validCount;
        document.getElementById('referralLink').textContent = getReferralLink();

        // Status referral
        var refStatus = document.getElementById('referralStatus');
        if (!username) {
            refStatus.textContent = '⚠️ Set Telegram username first! (Settings)';
            refStatus.style.color = '#F85149';
        } else if (validCount > 0) {
            refStatus.textContent = '✅ ' + validCount + ' valid referral(s)';
            refStatus.style.color = '#3FB950';
        } else {
            refStatus.textContent = '⏳ Need 3 daily claims & username';
            refStatus.style.color = '#8B949E';
        }
    }

    // ============================================================
    // 13. SIMPAN DATA
    // ============================================================
    function saveData() {
        localStorage.setItem('saldo', saldo);
        localStorage.setItem('lastClaim', lastClaim);
        localStorage.setItem('referralData', JSON.stringify(referralData));
    }

    // ============================================================
    // 14. CLAIM
    // ============================================================
    function doClaim() {
        if (alreadyClaimed) {
            alert('✅ Already claimed today! Come back tomorrow.');
            return;
        }

        // Cek username
        if (!username) {
            alert('⚠️ Please set a Telegram username first!\nGo to Settings → Username.');
            return;
        }

        // Cek device ID
        var savedDevice = localStorage.getItem('deviceId');
        if (savedDevice && savedDevice !== deviceId) {
            alert('⚠️ This device is already registered with another account!');
            return;
        }
        localStorage.setItem('deviceId', deviceId);

        // Tambah saldo
        saldo += 0.0005;
        lastClaim = todayStr;
        alreadyClaimed = true;

        // Update referral claim untuk user ini
        updateReferralClaim(userId);

        saveData();
        updateUI();
        alert('🎉 +0.0005 TON!');
    }

    // ============================================================
    // 15. SHARE REFERRAL
    // ============================================================
    function shareReferral() {
        var link = getReferralLink();
        var message = 'Join Calendar Coin and earn TON!\nUse my referral link:\n' + link;

        if (navigator.share) {
            navigator.share({
                title: 'Calendar Coin',
                text: message,
                url: link
            }).catch(function(err) {
                console.log('Share cancelled');
            });
        } else {
            navigator.clipboard.writeText(link).then(function() {
                alert('✅ Referral link copied!\nShare it with your friends.');
            }).catch(function() {
                prompt('Copy this link:', link);
            });
        }
    }

    // ============================================================
    // 16. SIMULASI REFERRAL DARI LINK (untuk testing)
    // ============================================================
    function handleReferralStart() {
        // Cek parameter start dari Telegram
        var startParam = tg.initDataUnsafe?.start_param || null;
        if (startParam && startParam !== userId && userId) {
            // Ada referral! Tambahkan referrer
            var referrerId = startParam;
            var refUsername = user.username || 'unknown';
            var refDeviceId = deviceId;
            addReferral(referrerId, refUsername, refDeviceId);
            console.log('📥 Referral from: ' + referrerId);
            // Bonus untuk user baru
            saldo += 0.0005;
            saveData();
            updateUI();
            alert('🎉 Welcome! +0.0005 TON bonus from referral!');
        }
    }

    // ============================================================
    // 17. EVENTS
    // ============================================================
    document.getElementById('btnClaim').onclick = doClaim;
    document.getElementById('btnWithdraw').onclick = function() {
        if (saldo < 1) {
            alert('⚠️ Minimum 1 TON required');
            return;
        }
        alert('💳 Withdraw to wallet...');
    };
    document.getElementById('btnReferral').onclick = shareReferral;

    // ============================================================
    // 18. START
    // ============================================================
    renderCalendar();
    handleReferralStart();
    updateUI();

    console.log('✅ Calendar Coin ready!');
    console.log('User ID:', userId);
    console.log('Username:', username);
    console.log('Device ID:', deviceId);
    console.log('Saldo:', saldo);
</script>

</body>
</html>
