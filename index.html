<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Coin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0D1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            max-width: 380px;
            width: 100%;
            background: #161B22;
            border-radius: 28px;
            padding: 24px 20px 28px;
            border: 1px solid #30363D;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #F0F6FC;
            letter-spacing: -0.3px;
        }
        .header .badge {
            background: #238636;
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .date {
            font-size: 14px;
            color: #8B949E;
            margin-bottom: 18px;
            font-weight: 400;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #0D1117;
            padding: 8px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .calendar .day-name {
            font-size: 11px;
            font-weight: 600;
            color: #8B949E;
            text-align: center;
            padding: 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .calendar .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: #C9D1D9;
            border-radius: 50%;
            transition: 0.15s;
        }
        .calendar .day.today {
            background: #238636;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 0 2px #238636;
        }
        .calendar .day.done {
            color: #8B949E;
            opacity: 0.4;
        }
        .calendar .day.empty {
            visibility: hidden;
        }
        .status {
            font-size: 14px;
            color: #F0883E;
            text-align: center;
            margin-bottom: 14px;
            font-weight: 450;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-claim {
            background: #238636;
            color: #fff;
        }
        .btn-claim:hover { background: #2EA043; }
        .btn-claim:disabled {
            background: #21262D;
            color: #484F58;
            cursor: not-allowed;
        }
        .btn-withdraw {
            background: #1F6FEB;
            color: #fff;
        }
        .btn-withdraw:hover { background: #388BFD; }
        .btn-withdraw:disabled {
            background: #21262D;
            color: #484F58;
            cursor: not-allowed;
        }
        .balance {
            background: #0D1117;
            border-radius: 16px;
            padding: 16px;
            margin: 14px 0 12px;
            border: 1px solid #21262D;
        }
        .balance .label {
            font-size: 12px;
            color: #8B949E;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .balance .amount {
            font-size: 32px;
            font-weight: 700;
            color: #F0F6FC;
            margin-top: 2px;
        }
        .balance .amount .ton {
            font-size: 16px;
            font-weight: 500;
            color: #8B949E;
        }
        .balance .usd {
            font-size: 14px;
            color: #8B949E;
            margin-top: 2px;
        }
        .footer {
            font-size: 11px;
            color: #484F58;
            text-align: center;
            margin-top: 14px;
        }
        .referral-box {
            background: #0D1117;
            border-radius: 16px;
            padding: 14px;
            margin: 14px 0 12px;
            border: 1px solid #21262D;
        }
        .referral-box .label {
            font-size: 12px;
            color: #8B949E;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .referral-box .count {
            font-size: 24px;
            font-weight: 700;
            color: #F0F6FC;
        }
        .referral-box .link {
            font-size: 11px;
            color: #58A6FF;
            word-break: break-all;
            margin: 6px 0;
            background: #161B22;
            padding: 6px 10px;
            border-radius: 8px;
        }
        .btn-referral {
            background: #1F6FEB;
            color: #fff;
            font-size: 14px;
            padding: 12px;
        }
        .btn-referral:hover { background: #388BFD; }
    </style>
</head>
<body>

<div class="card">

    <div class="header">
        <h1>📅 Calendar</h1>
        <span class="badge">TON</span>
    </div>

    <div class="date" id="tgl">Loading...</div>

    <div class="calendar" id="kalender"></div>

    <div class="status" id="status">✨ Not claimed today</div>

    <button class="btn btn-claim" id="btnClaim">🪙 Claim Daily Coin</button>

    <div class="balance">
        <div class="label">Balance</div>
        <div class="amount">
            <span id="saldoTon">0.000</span> <span class="ton">TON</span>
        </div>
        <div class="usd">$<span id="saldoUsd">0.000</span></div>
    </div>

    <button class="btn btn-withdraw" id="btnWithdraw">💳 Withdraw</button>

    <!-- REFERRAL -->
    <div class="referral-box">
        <div class="label">👥 Referrals</div>
        <div class="count" id="referralCount">0</div>
        <div class="link" id="referralLink">Loading...</div>
        <button class="btn btn-referral" id="btnReferral">📤 Share Link</button>
    </div>

    <div class="footer">Min. 1 TON · Secure · Fast</div>

</div>

<script>
    // ===== DATA =====
    var today = new Date();
    var tgl = today.getDate();
    var bulan = today.getMonth();
    var tahun = today.getFullYear();

    // Ambil data dari localStorage
    var saldo = parseFloat(localStorage.getItem('saldo')) || 0;
    var lastClaim = localStorage.getItem('lastClaim') || '';
    var referralCount = parseInt(localStorage.getItem('referralCount')) || 0;

    var reward = 0.0005;
    var minWd = 1;

    // ===== CEK SUDAH CLAIM HARI INI? =====
    var todayStr = today.toISOString().split('T')[0];
    var alreadyClaimed = (lastClaim === todayStr);

    // ===== KALENDER =====
    function renderCalendar() {
        var days = ['S','M','T','W','T','F','S'];
        var firstDay = new Date(tahun, bulan, 1).getDay();
        var totalDays = new Date(tahun, bulan+1, 0).getDate();

        var html = '';
        for (var i = 0; i < 7; i++) {
            html += '<div class="day-name">'+days[i]+'</div>';
        }
        for (var i = 0; i < firstDay; i++) {
            html += '<div class="day empty"></div>';
        }
        for (var d = 1; d <= totalDays; d++) {
            var cls = 'day';
            if (d === tgl) cls += ' today';
            if (d < tgl) cls += ' done';
            html += '<div class="'+cls+'">'+d+'</div>';
        }
        document.getElementById('kalender').innerHTML = html;

        var opt = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
        document.getElementById('tgl').textContent = today.toLocaleDateString('en-US', opt);
    }

    // ===== UPDATE UI =====
    function updateUI() {
        document.getElementById('saldoTon').textContent = saldo.toFixed(3);
        document.getElementById('saldoUsd').textContent = (saldo * 1.65).toFixed(3);
        document.getElementById('referralCount').textContent = referralCount;

        var status = document.getElementById('status');
        var btn = document.getElementById('btnClaim');

        if (alreadyClaimed) {
            status.textContent = '✅ Claimed today';
            btn.disabled = true;
            btn.textContent = '✅ Claimed';
        } else {
            status.textContent = '✨ Not claimed today';
            btn.disabled = false;
            btn.textContent = '🪙 Claim Daily Coin';
        }

        var wd = document.getElementById('btnWithdraw');
        if (saldo >= minWd) {
            wd.disabled = false;
            wd.textContent = '💳 Withdraw Now';
        } else {
            wd.disabled = true;
            wd.textContent = '💳 Withdraw ('+minWd+' TON min)';
        }

        // Referral link
        var userId = 'guest';
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.id) {
            userId = window.Telegram.WebApp.initDataUnsafe.user.id;
        }
        document.getElementById('referralLink').textContent =
            'https://t.me/CalendarCoinBot/rewards?start=' + userId;
    }

    // ===== SIMPAN =====
    function saveData() {
        localStorage.setItem('saldo', saldo);
        localStorage.setItem('lastClaim', lastClaim);
        localStorage.setItem('referralCount', referralCount);
    }

    // ===== CLAIM =====
    function doClaim() {
        if (alreadyClaimed) {
            alert('✅ Already claimed today! Come back tomorrow.');
            return;
        }

        saldo += reward;
        lastClaim = todayStr;
        alreadyClaimed = true;
        saveData();
        updateUI();
        alert('🎉 +'+reward+' TON');
    }

    // ===== REFERRAL =====
    function shareReferral() {
        var link = document.getElementById('referralLink').textContent;
        if (navigator.share) {
            navigator.share({ title: 'Calendar Coin', text: 'Join me on Calendar Coin!', url: link });
        } else {
            navigator.clipboard.writeText(link).then(function() {
                alert('✅ Link copied!');
                // Simulasi referral
                referralCount += 1;
                saldo += 0.0005; // bonus referral
                saveData();
                updateUI();
            }).catch(function() {
                prompt('Copy this link:', link);
            });
        }
    }

    // ===== EVENTS =====
    document.getElementById('btnClaim').onclick = doClaim;
    document.getElementById('btnWithdraw').onclick = function() {
        if (saldo < minWd) {
            alert('⚠️ Minimum '+minWd+' TON required');
            return;
        }
        alert('💳 Withdraw to wallet...');
    };
    document.getElementById('btnReferral').onclick = shareReferral;

    // ===== START =====
    renderCalendar();
    updateUI();

    console.log('✅ Calendar Coin ready!');
    console.log('Saldo:', saldo, 'TON');
    console.log('Last claim:', lastClaim);
</script>

</body>
</html>
