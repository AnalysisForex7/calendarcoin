<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Coin</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🪙 Calendar Coin</h1>

<div class="card">
<h2>Balance</h2>
<div id="balance" class="balance">0 Coin</div>
</div>

<div class="card">
<h2>⛏ Mining</h2>
<p>100 Coin / 24 Jam</p>

<div id="timer" class="timer">
Ready
</div>

<button id="mineBtn">
Claim
</button>

</div>

<div class="card">
<h2>📺 Watch Ads</h2>
<p>Reward +5 Coin</p>

<button id="adsBtn">
Watch Ads
</button>

</div>

<div class="card">
<h2>📅 Daily Login</h2>
<p>Reward +5 Coin</p>

<button id="dailyBtn">
Claim Daily
</button>

</div>

<div class="card">
<h2>💸 Withdraw</h2>

<p>Minimum 10.000 Coin</p>

<button id="withdrawBtn">
Withdraw
</button>

<p class="small">
Withdraw akan aktif jika saldo mencapai 10.000 Coin
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
