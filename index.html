<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Coin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f0eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .box {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 24px 20px 30px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 28px; color: #5D4037; }
        .date { font-size: 16px; color: #999; margin: 4px 0 16px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: #f0ebe6;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .grid .n { font-size: 12px; font-weight: bold; color: #999; padding: 4px; }
        .grid .d { padding: 8px; border-radius: 50%; font-size: 14px; }
        .grid .d.today { background: #4CAF50; color: white; font-weight: bold; }
        .grid .d.done { background: #C8E6C9; color: #2E7D32; }
        .grid .d.empty { visibility: hidden; }
        .status { font-size: 15px; color: #FF9800; margin: 10px 0; }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-claim { background: #4CAF50; color: white; }
        .btn-claim:disabled { background: #ccc; }
        .btn-withdraw { background: #FF9800; color: white; }
        .btn-withdraw:disabled { background: #ccc; }
        .saldo {
            background: #fafafa;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .saldo .label { color: #999; font-size: 13px; }
        .saldo .jumlah { font-size: 32px; font-weight: bold; color: #222; }
        .saldo .ton { font-size: 18px; color: #0088CC; }
        .saldo .usd { font-size: 14px; color: #999; }
    </style>
</head>
<body>

<div class="box">
    <h1>📅 Calendar Coin</h1>
    <div class="date" id="tgl">Loading...</div>

    <div class="grid" id="kalender"></div>

    <div class="status" id="status">✨ Today: Not claimed yet</div>

    <button class="btn btn-claim" id="btnClaim">🪙 Claim Today's Coin</button>

    <div class="saldo">
        <div class="label">Total Coins</div>
        <div class="jumlah">
            <span id="saldoTon">0.000</span> <span class="ton">TON</span>
        </div>
        <div class="usd">$<span id="saldoUsd">0.000</span></div>
    </div>

    <button class="btn btn-withdraw" id="btnWithdraw">💳 Withdraw (Min. 1 TON)</button>
</div>

<script>
    // ========== DATA ==========
    var today = new Date();
    var tgl = today.getDate();
    var bulan = today.getMonth();
    var tahun = today.getFullYear();

    var saldo = 0;
    var reward = 0.0005;
    var minWd = 1;

    // ========== KALENDER ==========
    function buatKalender() {
        var hari = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var firstDay = new Date(tahun, bulan, 1).getDay();
        var totalHari = new Date(tahun, bulan+1, 0).getDate();

        var html = '';
        for (var i = 0; i < 7; i++) {
            html += '<div class="n">'+hari[i]+'</div>';
        }
        for (var i = 0; i < firstDay; i++) {
            html += '<div class="d empty"></div>';
        }
        for (var d = 1; d <= totalHari; d++) {
            var cls = 'd';
            if (d === tgl) cls += ' today';
            if (d < tgl && d <= 5) cls += ' done';
            if (d > tgl) cls += ' empty';
            html += '<div class="'+cls+'">'+d+'</div>';
        }
        document.getElementById('kalender').innerHTML = html;

        var opt = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
        document.getElementById('tgl').textContent = today.toLocaleDateString('en-US', opt);
    }

    // ========== UPDATE ==========
    function updateUI() {
        document.getElementById('saldoTon').textContent = saldo.toFixed(3);
        var usd = saldo * 1.65;
        document.getElementById('saldoUsd').textContent = usd.toFixed(3);

        var sudahClaim = false;
        var status = document.getElementById('status');
        var btn = document.getElementById('btnClaim');
        if (sudahClaim) {
            status.textContent = '✅ Today: Already claimed!';
            btn.disabled = true;
            btn.textContent = '✅ Already claimed today';
        } else {
            status.textContent = '✨ Today: Not claimed yet';
            btn.disabled = false;
            btn.textContent = '🪙 Claim Today\'s Coin';
        }

        var wd = document.getElementById('btnWithdraw');
        if (saldo >= minWd) {
            wd.disabled = false;
            wd.textContent = '💳 Withdraw Now';
        } else {
            wd.disabled = true;
            wd.textContent = '💳 Withdraw (Min. 1 TON)';
        }
    }

    // ========== EVENT ==========
    document.getElementById('btnClaim').onclick = function() {
        saldo = saldo + reward;
        updateUI();
        alert('+0.0005 TON!');
    };

    document.getElementById('btnWithdraw').onclick = function() {
        if (saldo < minWd) {
            alert('Balance not enough! Minimum 1 TON.');
            return;
        }
        alert('Withdraw to TON wallet...');
    };

    // ========== START ==========
    buatKalender();
    updateUI();
</script>

</body>
</html>
